name: MyMill
options:
  bundleIdPrefix: com.mymill
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  MyMill:
    type: application
    platform: macOS
    sources:
      - MyMill
    settings:
      base:
        INFOPLIST_FILE: MyMill/Info.plist
        CODE_SIGN_ENTITLEMENTS: MyMill/MyMill.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 7QYJGN67LC
        PRODUCT_BUNDLE_IDENTIFIER: com.mymill.app
        PRODUCT_NAME: MyMill
        PRODUCT_MODULE_NAME: MyMill
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MyMill/MyMill.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.bluetooth: true
        com.apple.developer.healthkit: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true

  MyMillTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - MyMillTests
    dependencies:
      - target: MyMill
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/MyMill.app/Contents/MacOS/MyMill"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  MyMill:
    build:
      targets:
        MyMill: all
        MyMillTests: [test]
    test:
      targets:
        - MyMillTests
