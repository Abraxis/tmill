name: Treadmill
options:
  bundleIdPrefix: com.treadmill
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Treadmill:
    type: application
    platform: macOS
    sources:
      - Treadmill
    settings:
      base:
        INFOPLIST_FILE: Treadmill/Info.plist
        CODE_SIGN_ENTITLEMENTS: Treadmill/Treadmill.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.treadmill.app
        PRODUCT_NAME: Treadmill
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Treadmill/Treadmill.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.bluetooth: true
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.treadmill.app
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.access: []

  TreadmillTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - TreadmillTests
    dependencies:
      - target: Treadmill
    settings:
      base:
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Treadmill.app/Contents/MacOS/Treadmill"
        BUNDLE_LOADER: "$(TEST_HOST)"
